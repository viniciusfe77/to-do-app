<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barros Task | High-Performance Ecosystem</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* ==========================================================================
           1. VARIÁVEIS ATÔMICAS (:root)
           ========================================================================== */
        :root {
            /* Cores de Prioridade */
            --high-priority: #ff6b6b;
            --medium-priority: #fbc531;
            --low-priority: #48dbfb;
            --accent: #6366f1;
            
            /* Glassmorphism & Background */
            --bg-gradient: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            --glass-white: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(255, 255, 255, 0.7);
            --text-main: #1e293b;
            --text-secondary: #64748b;
            
            /* Sombras em Camadas (Neuromorphism) */
            --shadow-layer: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --glow-accent: 0 0 20px rgba(99, 102, 241, 0.2);
        }

        /* ==========================================================================
           2. LAYOUT & SIDEBAR
           ========================================================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            color: var(--text-main);
        }

        .sidebar {
            width: 280px;
            background: var(--glass-white);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border);
            height: 100vh;
            position: fixed;
            display: flex;
            flex-direction: column;
            padding: 2rem;
            z-index: 100;
        }

        .logo {
            font-weight: 800;
            font-size: 1.6rem;
            letter-spacing: -1.2px;
            color: var(--accent);
            margin-bottom: 3rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-menu {
            list-style: none;
            flex-grow: 1;
        }

        .nav-item {
            padding: 14px 18px;
            border-radius: 16px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 700;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-item:hover, .nav-item.active {
            background: white;
            color: var(--accent);
            box-shadow: var(--shadow-layer);
            transform: translateX(5px);
        }

        .user-card {
            background: var(--glass-white);
            padding: 1rem;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 42px;
            height: 42px;
            border-radius: 14px;
            background: var(--accent);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
        }

        /* ==========================================================================
           3. MAIN CONTENT & HEADER
           ========================================================================== */
        main {
            margin-left: 280px;
            flex-grow: 1;
            padding: 3rem;
            max-width: calc(100vw - 280px);
        }

        header {
            margin-bottom: 2.5rem;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .greeting h1 {
            font-weight: 800;
            font-size: 2.4rem;
            letter-spacing: -1px;
        }

        .search-container {
            position: relative;
            width: 380px;
        }

        .search-container input {
            width: 100%;
            padding: 14px 24px;
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            background: var(--glass-white);
            backdrop-filter: blur(10px);
            outline: none;
            font-weight: 600;
            transition: 0.3s;
        }

        .search-container input:focus {
            background: white;
            border-color: var(--accent);
            box-shadow: var(--glow-accent);
        }

        /* Tabs Navigation */
        .tabs {
            display: flex;
            gap: 15px;
            margin-top: 2rem;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            padding-bottom: 12px;
        }

        .tab-btn {
            background: transparent;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: 700;
            color: var(--text-secondary);
            cursor: pointer;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: var(--accent);
            color: white;
            box-shadow: 0 8px 15px rgba(99, 102, 241, 0.3);
        }

        /* ==========================================================================
           4. TASK CARDS
           ========================================================================== */
        .task-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 24px;
            margin-top: 2rem;
        }

        .task-card {
            background: var(--glass-white);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 1.8rem;
            position: relative;
            box-shadow: var(--shadow-layer);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
        }

        .task-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            background: rgba(255, 255, 255, 0.6);
        }

        .priority-bar {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 6px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .task-card h3 {
            font-weight: 800;
            font-size: 1.3rem;
            margin-bottom: 10px;
            transition: 0.3s;
        }

        .task-card p {
            font-size: 0.95rem;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }

        .metadata {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .deadline-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-secondary);
        }

        .deadline-badge.urgent { color: var(--high-priority); }

        .team-stack {
            display: flex;
            flex-direction: row-reverse;
        }

        .member-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: white;
            border: 2px solid var(--glass-border);
            margin-right: -10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 800;
            box-shadow: var(--shadow-layer);
        }

        /* Task Completed State */
        .task-card.done {
            opacity: 0.5;
            transform: scale(0.96);
        }
        .task-card.done h3 { text-decoration: line-through; }

        /* ==========================================================================
           5. FAB & MODAL FORM
           ========================================================================== */
        .fab {
            position: fixed;
            bottom: 40px;
            right: 40px;
            width: 70px;
            height: 70px;
            background: var(--accent);
            border-radius: 22px;
            border: none;
            color: white;
            font-size: 2.2rem;
            cursor: pointer;
            box-shadow: 0 12px 24px rgba(99, 102, 241, 0.4);
            transition: all 0.4s;
            z-index: 200;
        }

        .fab:hover {
            transform: scale(1.15) rotate(90deg);
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(12px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            width: 480px;
            padding: 2.5rem;
            border-radius: 35px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.15);
            animation: modalPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes modalPop {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-weight: 700;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 14px 18px;
            border-radius: 14px;
            border: 1px solid #e2e8f0;
            background: #f8fafc;
            outline: none;
            font-weight: 600;
            transition: 0.3s;
        }

        .form-group input:focus { border-color: var(--accent); }

        .btn-primary {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 16px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(99, 102, 241, 0.3);
        }

        /* ==========================================================================
           6. RESPONSIVIDADE
           ========================================================================== */
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            main { margin-left: 0; padding: 1.5rem; max-width: 100vw; }
            .header-top { flex-direction: column; gap: 1rem; }
            .search-container { width: 100%; }
            .task-grid { grid-template-columns: 1fr; }
        }

        /* Empty State */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 5rem;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo">⚡ Barros Task</div>
        <ul class="nav-menu">
            <li class="nav-item active" onclick="filterTasks('all')">Dashboard</li>
            <li class="nav-item">Equipes</li>
            <li class="nav-item">Relatórios</li>
            <li class="nav-item">Projetos</li>
        </ul>
        <div class="user-card">
            <div class="avatar">V</div>
            <div>
                <p style="font-weight: 800; font-size: 0.9rem;">Vinícius</p>
                <p style="font-size: 0.75rem; color: var(--text-secondary);">ADS - Grupo OPB</p>
            </div>
        </div>
    </aside>

    <main>
        <header>
            <div class="header-top">
                <div class="greeting">
                    <h1 id="dynamic-greeting">Olá, Vinícius</h1>
                    <p style="color: var(--text-secondary)">Acompanhe o progresso das suas missões hoje.</p>
                </div>
                <div class="search-container">
                    <input type="text" placeholder="Buscar tarefa ou membro...">
                </div>
            </div>

            <div class="tabs">
                <button class="tab-btn active" data-filter="all">Geral</button>
                <button class="tab-btn" data-filter="mine">Minhas Tarefas</button>
                <button class="tab-btn" data-filter="team">Grupo OPB</button>
                <button class="tab-btn" data-filter="done">Concluídas</button>
            </div>
        </header>

        <div class="task-grid" id="task-grid">
            </div>
    </main>

    <button class="fab" id="fab">+</button>

    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <h2 style="font-weight: 800; margin-bottom: 2rem;">Nova Missão</h2>
            <form id="task-form">
                <div class="form-group">
                    <label>Título da Tarefa</label>
                    <input type="text" id="title" required placeholder="Ex: Refatorar API Cassandra">
                </div>
                <div class="form-group">
                    <label>Descrição</label>
                    <textarea id="desc" rows="3" placeholder="Detalhes técnicos da tarefa..."></textarea>
                </div>
                <div style="display: flex; gap: 15px;">
                    <div class="form-group" style="flex: 1;">
                        <label>Data Limite</label>
                        <input type="date" id="date" required>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>Prioridade</label>
                        <select id="priority">
                            <option value="low">Baixa</option>
                            <option value="medium" selected>Média</option>
                            <option value="high">Alta</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn-primary">Criar Tarefa</button>
                <button type="button" onclick="closeModal()" style="width: 100%; margin-top: 10px; background: none; border: none; color: var(--text-secondary); cursor: pointer;">Cancelar</button>
            </form>
        </div>
    </div>

    <script>
        /* ==========================================================================
           MOTOR DE TAREFAS (Business Logic)
           ========================================================================== */
        
        // Memória local (LocalStorage)
        let tasks = JSON.parse(localStorage.getItem('barros_tasks_v1')) || [
            { id: 1, title: 'Aura Bank Prototype', desc: 'Ajustar contraste e WCAG 2.1 para daltonismo.', date: '2026-04-16', priority: 'high', team: 'Grupo OPB', members: ['V', 'P', 'O'], done: false },
            { id: 2, title: 'Refatoração Backend', desc: 'Migrar endpoints para Cassandra DB.', date: '2026-04-18', priority: 'medium', team: 'Individual', members: ['V'], done: false }
        ];

        const taskGrid = document.getElementById('task-grid');
        const modal = document.getElementById('modal');
        const fab = document.getElementById('fab');
        const taskForm = document.getElementById('task-form');

        // Renderização Dinâmica
        function renderTasks(filter = 'all') {
            taskGrid.innerHTML = '';
            
            const filtered = tasks.filter(t => {
                if (filter === 'done') return t.done;
                if (filter === 'team') return t.team === 'Grupo OPB' && !t.done;
                if (filter === 'mine') return t.members.includes('V') && !t.done;
                return !t.done;
            });

            if (filtered.length === 0) {
                taskGrid.innerHTML = `<div class="empty-state"><h3>Nada por aqui! 🚀</h3><p>Todas as tarefas foram concluídas.</p></div>`;
                return;
            }

            filtered.forEach(task => {
                const isUrgent = new Date(task.date).toDateString() === new Date().toDateString();
                const color = `var(--${task.priority}-priority)`;
                
                const card = document.createElement('div');
                card.className = `task-card ${task.done ? 'done' : ''}`;
                card.innerHTML = `
                    <div class="priority-bar" style="background: ${color}"></div>
                    <div class="card-header">
                        <span style="font-size: 0.75rem; font-weight: 800; color: ${color}; text-transform: uppercase;">${task.priority}</span>
                        <input type="checkbox" ${task.done ? 'checked' : ''} onclick="toggleComplete(${task.id})">
                    </div>
                    <h3>${task.title}</h3>
                    <p>${task.desc}</p>
                    <div class="metadata">
                        <div class="deadline-badge ${isUrgent ? 'urgent' : ''}">
                            🕒 ${task.date}
                        </div>
                        <div class="team-stack">
                            ${task.members.map(m => `<div class="member-avatar">${m}</div>`).join('')}
                        </div>
                    </div>
                `;
                taskGrid.appendChild(card);
            });
            
            saveToStorage();
        }

        // Ações
        function toggleComplete(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.done = !task.done;
                renderTasks(document.querySelector('.tab-btn.active').dataset.filter);
            }
        }

        function saveToStorage() {
            localStorage.setItem('barros_tasks_v1', JSON.stringify(tasks));
        }

        // Modal Logic
        fab.onclick = () => modal.style.display = 'flex';
        function closeModal() { modal.style.display = 'none'; }

        taskForm.onsubmit = (e) => {
            e.preventDefault();
            const newTask = {
                id: Date.now(),
                title: document.getElementById('title').value,
                desc: document.getElementById('desc').value,
                date: document.getElementById('date').value,
                priority: document.getElementById('priority').value,
                team: 'Individual',
                members: ['V'],
                done: false
            };
            tasks.push(newTask);
            closeModal();
            taskForm.reset();
            renderTasks();
        };

        // Filtros
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.onclick = (e) => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderTasks(btn.dataset.filter);
            }
        });

        // Init
        window.onclick = (e) => { if (e.target == modal) closeModal(); }
        renderTasks();
    </script>
</body>
</html>
